version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: barterhub_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: barterhub
    networks:
      - barterhub_network
    restart: unless-stopped

  # Backend API Server
  backend:
    build: .
    container_name: barterhub_backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/barterhub?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your_secret_key}
      JWT_EXPIRE: 7d
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - barterhub_network
    restart: unless-stopped
    command: npm run dev

  # Optional: Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: barterhub_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - barterhub_network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  barterhub_network:
    driver: bridge
