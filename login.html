<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BarterHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-box">
      <a href="index.html" class="logo text-center">
        <i class="fas fa-exchange-alt"></i>
        <span>BarterHub</span>
      </a>
      
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showForm('login')">Login</button>
        <button class="auth-tab" onclick="showForm('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <div class="error-message" id="loginError"></div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" onsubmit="handleRegister(event)" style="display:none;">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="registerName" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Create a password" required>
        </div>
        <div class="error-message" id="registerError"></div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
  <script>
    function showForm(form) {
      document.getElementById('loginForm').style.display = form === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = form === 'register' ? 'block' : 'none';
      document.querySelectorAll('.auth-tab').forEach((tab, i) => {
        tab.classList.toggle('active', (i === 0 && form === 'login') || (i === 1 && form === 'register'));
      });
    }
  </script>
</body>
</html>
